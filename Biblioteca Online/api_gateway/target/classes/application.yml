server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Microservicio de Libros
        - id: ms-libro
          uri: ${MS_LIBRO_URI:http://localhost:8081}
          predicates:
            - Path=/api/libros/**

        # Microservicio de Categorias
        - id: ms-categoria
          uri: ${MS_CATEGORIA_URI:http://localhost:8082}
          predicates:
            - Path=/api/categorias/**

        # Microservicio de Estados
        - id: ms-estado
          uri: ${MS_ESTADO_URI:http://localhost:8083}
          predicates:
            - Path=/api/estados/**

        # Microservicio de Usuarios
        - id: ms-usuario
          uri: ${MS_USUARIO_URI:http://localhost:8084}
          predicates:
            - Path=/api/usuarios/**

        # Microservicio de Ventas
        - id: ms-venta
          uri: ${MS_VENTA_URI:http://localhost:8085}
          predicates:
            - Path=/api/ventas/**

        # Microservicio de Direcciones
        - id: ms-direccion
          uri: ${MS_DIRECCION_URI:http://localhost:8086}
          predicates:
            - Path=/api/direcciones/**

        # Microservicio de Reseñas
        - id: ms-resena
          uri: ${MS_RESENA_URI:http://localhost:8087}
          predicates:
            - Path=/api/resenas/**

        # Microservicio de Carrito (Nuevo)
        - id: ms-carrito
          uri: ${MS_CARRITO_URI:http://localhost:8088}
          predicates:
            - Path=/api/carrito/**

        # Microservicio de Pago (Nuevo)
        - id: ms-pago
          uri: ${MS_PAGO_URI:http://localhost:8089}
          predicates:
            - Path=/api/pagos/**

        # Microservicio de Envio (Nuevo)
        - id: ms-envio
          uri: ${MS_ENVIO_URI:http://localhost:8090}
          predicates:
            - Path=/api/envios/**
