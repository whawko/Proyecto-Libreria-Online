spring.application.name=libros
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/bd_libros
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#propiedad personalizada para las url de los microservicios que debo comunicarme
ms.categoria.url=http://localhost:8082
ms.estado.url=http://localhost:8083
