services:
 
  #Servicio 1: levantar MySQL
  mysql:
    image: mysql:8.4
    container_name: mysql-microservicios
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bd_estados
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservicios-net
 
  #Servicio 2: Eureka
  eureka-server:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: on-failure
    networks:
      - microservicios-net
 
  #Servicio 3: categoria
  ms-categoria:
    build:
      context: ./ms-categoria
      dockerfile: Dockerfile
    container_name: ms-categoria
    volumes:
      - ./logs/ms-categoria:/app/logs
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: on-failure
    networks:
      microservicios-net:
        - microservicios-net

 
  #Servicio 4: usuario
  ms-usuario:
    build:
      context: ./ms-usuario
      dockerfile: Dockerfile
