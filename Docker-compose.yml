  #Servicio 11: api-gateway (siempre al final, depende de todos)
  api-gateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_started
      ms-estado:
        condition: service_started
      ms-categoria:
        condition: service_started
      ms-usuario:
        condition: service_started
      ms-libro:
        condition: service_started
      ms-direccion:
        condition: service_started
      ms-carrito:
        condition: service_started
      ms-venta:
        condition: service_started
      ms-pago:
        condition: service_started
      ms-envio:
        condition: service_started
      ms-resena:
        condition: service_started
    restart: on-failure
    networks:
      - microservicios-net
 
volumes:
  mysql-data:
 
networks:
  microservicios-net:
    driver: bridge